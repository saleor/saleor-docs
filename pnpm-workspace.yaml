allowBuilds:
  "@swc/core": true
  core-js: true
  core-js-pure: true

# Docusaurus swizzled theme components in src/theme/ import transitive deps
# (e.g. @docusaurus/theme-common, @docusaurus/plugin-content-docs/client, clsx)
# that aren't declared in package.json. pnpm hides those by default; hoist
# them to the root node_modules so the build resolves them like npm did.
publicHoistPattern:
  - "*@docusaurus/*"
  - "clsx"
